version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://inova:${DB_PASS:-inova123}@db:5432/inova
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-refresh-dev-key}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: inova
      POSTGRES_USER: inova
      POSTGRES_PASSWORD: ${DB_PASS:-inova123}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inova"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - app_public:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
